---
# Standard Python CI workflows for the project.
#
# Based on the "Python workflow" provided by GitHub.

name: Build and Test

# yamllint disable-line rule:truthy
on:
  pull_request:
    branches: ["main"]
  push:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # python 3.15 has not been released yet.
        python_version: [3.11, 3.12, 3.13, 3.14]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python environment
        uses: actions/setup-python@v3
        with:
          python-version: "${{ matrix.python_version }}"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox
      - name: Test with tox
        run: |
          # tox requires environments be specified like `py312`, etc, instead
          # of `3.12`.
          target_python_env=$(echo "${{ matrix.python_version }}" | \
            sed -e 's/^/py/' -e 's/\.//')
          tox run -e coverage,${{ matrix.python_version }} -c .
